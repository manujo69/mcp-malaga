services:
  frontend:
    build:
      context: ./front-angular
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./back-node
    env_file:
      - path: /etc/mcp-malaga/secrets.env
        required: true
    environment:
      - PORT=3000
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - MODEL=${MODEL:-claude-sonnet-4-6}
    restart: unless-stopped
