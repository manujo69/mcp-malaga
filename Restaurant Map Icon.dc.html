<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  body { margin:0; }
</style>
</helmet>
<div style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px; background:#eceae4; padding:48px; box-sizing:border-box; font-family:ui-monospace, 'SF Mono', Menlo, monospace;">

  <svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" style="display:block; border-radius:50%;">
    <defs>
      <clipPath id="circleClip"><circle cx="256" cy="256" r="256"></circle></clipPath>
      <g id="sil" fill="#D97E1E">
        <rect x="148" y="78" width="22" height="94" rx="11"></rect>
        <rect x="179" y="78" width="22" height="94" rx="11"></rect>
        <rect x="210" y="78" width="22" height="94" rx="11"></rect>
        <rect x="148" y="140" width="84" height="108" rx="24"></rect>
        <rect x="176" y="240" width="28" height="78" rx="14"></rect>
        <rect x="168" y="300" width="44" height="136" rx="22"></rect>
        <path d="M302 305 L302 158 C302 128 318 100 350 78 L350 305 Z"></path>
        <rect x="302" y="300" width="48" height="136" rx="22"></rect>
      </g>
    </defs>

    <g clip-path="url(#circleClip)">
      <!-- background -->
      <circle cx="256" cy="256" r="256" fill="#F2942A"></circle>

      <!-- long shadow -->
      <sc-if value="{{ showShadow }}" hint-placeholder-val="{{ true }}">
        {{ shadowUses }}
      </sc-if>

      <!-- cutlery -->
      <g>
        <!-- FORK -->
        <rect x="148" y="78" width="22" height="94" rx="11" fill="#E9F3F7"></rect>
        <rect x="179" y="78" width="22" height="94" rx="11" fill="#E9F3F7"></rect>
        <rect x="210" y="78" width="22" height="94" rx="11" fill="#E9F3F7"></rect>
        <rect x="148" y="140" width="84" height="108" rx="24" fill="#E9F3F7"></rect>
        <rect x="176" y="240" width="28" height="78" rx="14" fill="#E9F3F7"></rect>
        <rect x="154" y="142" width="13" height="100" rx="6" fill="#FFFFFF" opacity="0.55"></rect>
        <!-- fork band + handle -->
        <rect x="168" y="300" width="44" height="30" rx="6" fill="#F2C94C"></rect>
        <rect x="168" y="324" width="44" height="112" rx="22" fill="#423B35"></rect>

        <!-- KNIFE -->
        <path d="M302 305 L302 158 C302 128 318 100 350 78 L350 305 Z" fill="#E9F3F7"></path>
        <path d="M302 305 L302 164 C302 132 316 104 340 84 L340 150 C 322 150 314 160 314 178 L314 305 Z" fill="#FFFFFF" opacity="0.55"></path>
        <!-- knife band + handle -->
        <rect x="302" y="300" width="48" height="30" rx="6" fill="#F2C94C"></rect>
        <rect x="302" y="324" width="48" height="112" rx="22" fill="#423B35"></rect>
      </g>
    </g>
  </svg>

  <div style="font-size:13px; color:#8a8780; letter-spacing:0.04em;">restaurante · 512px</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 608, &quot;height&quot;: 640 },
  &quot;showShadow&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const uses = [];
    for (let k = 1; k <= 280; k++) {
      uses.push(React.createElement('use', { key: k, href: '#sil', x: k, y: k }));
    }
    return {
      showShadow: this.props.showShadow ?? true,
      shadowUses: uses,
    };
  }
}
</script>
</body>
</html>
